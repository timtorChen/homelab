---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/secretstore_v1.json
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  namespace: cert-manager
  name: cert-manager-timtor-dev-clusterissuer
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: cert-manager-timtor-dev-clusterissuer
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  namespace: cert-manager
  name: cert-manager-timtor-dev-clusterissuer-secret
spec:
  refreshInterval: "24h"
  secretStoreRef:
    kind: SecretStore
    name: cert-manager-timtor-dev-clusterissuer
  refreshPolicy: OnChange
  target:
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: /kubernetes/cert-manager/clusterissuer/timtor-dev
