---
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: flux-local

on:
  pull_request:

jobs:
  lint:
    name: Flux local
    runs-on: ubuntu-latest
    strategy:
      matrix:
        resource: ["helmrelease", "kustomization"]
    steps:
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@5adad89dcce7b79f20274ae8e112bcec7bd46764 # v2.8.5
      - uses: allenporter/flux-local/action/diff@d4ebcae7ae08c8c8b8b7c1f515cf86759f9ca950 # 8.1.0
        id: diff
        with:
          path: kubernetes/flux-system
          sources: homelab
          resource: ${{ matrix.resource }}
      - name: PR Comments
        uses: mshick/add-pr-comment@64b8e914979889d746c99dea15a76e77ef64580a # v3.10.0
        if: ${{ steps.diff.outputs.diff != '' }}
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message-id: "${{ github.event.pull_request.number }}/${{ matrix.resource }}"
          message-failure: flux-local diff is not successful
          message: |
            `````diff
            ${{ steps.diff.outputs.diff }}
            `````
