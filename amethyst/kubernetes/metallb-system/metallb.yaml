---
# Helm
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  namespace: metallb-system
  name: metallb
spec:
  url: https://metallb.github.io/metallb
  interval: 24h
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  namespace: metallb-system
  name: metallb
spec:
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        name: metallb
      version: 0.14.4
      chart: metallb
  interval: 1h
  maxHistory: 1
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      enabled: false
    speaker:
      frr:
        enabled: false
